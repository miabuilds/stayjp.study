<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N5 文法筆記 — 出口日語</title>
<style>
:root {
  --bg: #faf8f5;
  --bg-card: #ffffff;
  --bg-sidebar: #1a1a2e;
  --bg-sidebar-hover: #16213e;
  --bg-sidebar-active: #0f3460;
  --text: #2d2d2d;
  --text-light: #666;
  --text-sidebar: #c8c8d0;
  --text-sidebar-active: #ffffff;
  --accent: #e94560;
  --accent2: #0f3460;
  --border: #e8e4df;
  --jp: #1a1a2e;
  --zh: #555;
  --tag-bg: #f0ebe5;
  --tag-text: #8b7355;
  --shadow: 0 1px 3px rgba(0,0,0,.06);
  --shadow-hover: 0 4px 12px rgba(0,0,0,.1);
  --radius: 10px;
  --sidebar-w: 280px;
  --header-h: 64px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; scroll-padding-top: calc(var(--header-h) + 24px); }
body {
  font-family: "Hiragino Kaku Gothic ProN","Noto Sans TC","Noto Sans JP","PingFang TC",
    -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  font-size: 15px;
}

/* Header */
.header {
  position: fixed; top:0; left:0; right:0; height: var(--header-h);
  background: var(--bg-sidebar);
  display: flex; align-items: center; padding: 0 24px;
  z-index: 100; gap: 16px;
}
.header h1 {
  color: #fff; font-size: 18px; font-weight: 600;
  white-space: nowrap;
}
.header h1 span { color: var(--accent); }
.header .search-box {
  flex:1; max-width: 420px; position: relative;
}
.header .search-box input {
  width:100%; padding: 8px 16px 8px 38px;
  border: none; border-radius: 8px;
  background: rgba(255,255,255,.1);
  color: #fff; font-size: 14px;
  outline: none; transition: background .2s;
}
.header .search-box input::placeholder { color: rgba(255,255,255,.4); }
.header .search-box input:focus { background: rgba(255,255,255,.18); }
.header .search-box svg {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  width:16px; height:16px; stroke: rgba(255,255,255,.4);
}
.header .stats {
  color: rgba(255,255,255,.5); font-size: 13px;
  margin-left: auto; white-space: nowrap;
}
.menu-btn {
  display: none; background:none; border:none;
  color:#fff; cursor:pointer; padding:4px;
}
.menu-btn svg { width:24px; height:24px; }

/* Sidebar */
.sidebar {
  position: fixed; top: var(--header-h); left:0;
  width: var(--sidebar-w); height: calc(100vh - var(--header-h));
  background: var(--bg-sidebar);
  overflow-y: auto; padding: 12px 0;
  z-index: 90;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,.1) transparent;
}
.sidebar::-webkit-scrollbar { width:4px; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius:2px; }
.sidebar .cat-title {
  padding: 10px 20px 6px; font-size: 11px; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--accent);
  font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  user-select: none;
}
.sidebar .cat-title::after {
  content:''; display:inline-block; width:6px; height:6px;
  border-right: 1.5px solid var(--accent); border-bottom: 1.5px solid var(--accent);
  transform: rotate(45deg); transition: transform .2s;
}
.sidebar .cat-title.collapsed::after { transform: rotate(-45deg); }
.sidebar .cat-items { overflow: hidden; transition: max-height .3s ease; }
.sidebar .cat-items.collapsed { max-height: 0 !important; }
.sidebar a {
  display: block; padding: 6px 20px 6px 28px;
  color: var(--text-sidebar); text-decoration: none;
  font-size: 13px; transition: all .15s;
  border-left: 3px solid transparent;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sidebar a:hover {
  background: var(--bg-sidebar-hover);
  color: #fff;
}
.sidebar a.active {
  background: var(--bg-sidebar-active);
  color: var(--text-sidebar-active);
  border-left-color: var(--accent);
}

/* Main */
.main {
  margin-left: var(--sidebar-w);
  padding: calc(var(--header-h) + 32px) 40px 80px;
  max-width: 900px;
}

/* Intro */
.intro {
  background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%);
  color: #fff; border-radius: var(--radius); padding: 32px;
  margin-bottom: 40px;
}
.intro h2 { font-size: 24px; margin-bottom: 8px; }
.intro p { color: rgba(255,255,255,.7); font-size: 14px; line-height: 1.8; }
.intro .tag-row { display:flex; gap:8px; margin-top:16px; flex-wrap:wrap; }
.intro .tag {
  background: rgba(255,255,255,.12); color: rgba(255,255,255,.8);
  padding: 4px 12px; border-radius: 20px; font-size: 12px;
}

/* Category Section */
.cat-section { margin-bottom: 48px; }
.cat-section > h2 {
  font-size: 20px; font-weight: 700; margin-bottom: 20px;
  padding-bottom: 10px; border-bottom: 2px solid var(--accent);
  display: flex; align-items: center; gap: 10px;
}
.cat-section > h2 .cat-icon {
  width:28px; height:28px; border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; flex-shrink:0;
  background: var(--accent); color:#fff;
}

/* Grammar Card */
.grammar-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 16px;
  overflow: hidden;
  transition: box-shadow .2s;
  border: 1px solid var(--border);
}
.grammar-card:hover { box-shadow: var(--shadow-hover); }
.grammar-card .card-header {
  padding: 16px 20px;
  cursor: pointer;
  display: flex; align-items: center; gap: 12px;
  user-select: none;
}
.grammar-card .card-header:hover { background: #faf8f5; }
.grammar-card .card-num {
  background: var(--accent2); color:#fff;
  width:28px; height:28px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700; flex-shrink:0;
}
.grammar-card .card-title {
  font-size: 16px; font-weight: 600; color: var(--jp);
  flex:1;
}
.grammar-card .card-toggle {
  width:20px; height:20px; transition: transform .2s;
  stroke: #aaa; flex-shrink:0;
}
.grammar-card.open .card-toggle { transform: rotate(180deg); }
.grammar-card .card-body {
  max-height:0; overflow:hidden;
  transition: max-height .35s ease;
}
.grammar-card.open .card-body { max-height: 2000px; }
.grammar-card .card-content {
  padding: 0 20px 20px;
  border-top: 1px solid var(--border);
}
.grammar-card .explain {
  margin: 16px 0;
  color: var(--text);
  font-size: 14px;
  line-height: 1.9;
}
.grammar-card .pattern-box {
  background: #f7f5f2; border-radius: 8px;
  padding: 12px 16px; margin: 12px 0;
  font-size: 15px; font-weight: 600;
  color: var(--accent2);
  border-left: 3px solid var(--accent);
}
.grammar-card .examples { margin-top: 16px; }
.grammar-card .example {
  padding: 10px 0;
  border-bottom: 1px dashed var(--border);
}
.grammar-card .example:last-child { border-bottom:none; }
.grammar-card .example .jp {
  font-size: 15px; color: var(--jp); font-weight: 500;
  line-height: 1.8;
}
.grammar-card .example .jp em {
  font-style: normal; color: var(--accent);
  font-weight: 700; text-decoration: underline;
  text-decoration-color: rgba(233,69,96,.3);
  text-underline-offset: 3px;
}
.grammar-card .example .zh {
  font-size: 13px; color: var(--zh); margin-top: 2px;
}
.grammar-card .note {
  margin-top: 14px; padding: 10px 14px;
  background: #fff8e1; border-radius: 6px;
  font-size: 13px; color: #8b6914;
  border-left: 3px solid #f5c842;
}
.grammar-card .note::before { content:"💡 "; }

/* Back to top */
.back-top {
  position: fixed; bottom:24px; right:24px;
  width:44px; height:44px; border-radius:50%;
  background: var(--accent2); color:#fff;
  border:none; cursor:pointer; font-size:18px;
  box-shadow: 0 2px 10px rgba(0,0,0,.2);
  opacity:0; transition: opacity .3s;
  z-index:80;
  display:flex; align-items:center; justify-content:center;
}
.back-top.show { opacity:1; }

/* No results */
.no-results {
  text-align:center; padding:60px 20px;
  color: var(--text-light);
}
.no-results svg { width:64px; height:64px; stroke:#ccc; margin-bottom:16px; }

/* Footer */
.footer {
  margin-left: var(--sidebar-w);
  padding: 24px 40px;
  text-align: center;
  color: var(--text-light);
  font-size: 12px;
  border-top: 1px solid var(--border);
}
.footer a { color: var(--accent2); text-decoration:none; }

/* Responsive */
@media(max-width:860px) {
  .sidebar { transform: translateX(-100%); transition: transform .3s; width:260px; }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left:0; padding: calc(var(--header-h)+20px) 16px 60px; }
  .footer { margin-left:0; padding:24px 16px; }
  .menu-btn { display:block; }
  .overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.4); z-index:85;
  }
  .overlay.show { display:block; }
}
</style>
</head>

<header class="header">

  <h1>N5 <span>文法筆記</span></h1>

<script>
// ===== DATA =====
const DATA = [
// ── 基本句型 ──
{id:"desu-noun",cat:"基本句型",t:"～です・～じゃありません（名詞）",
 p:"名詞 ＋ です／じゃありません",
 ex:"肯定用「です」，否定用「じゃありません」（較正式：ではありません）。普通體為「だ／じゃない」。",
 eg:[
  {j:"佐藤さんは<em>会社員です</em>。",z:"佐藤是公司職員。"},
  {j:"鈴木さんは学生<em>じゃありません</em>。社会人です。",z:"鈴木不是學生，是社會人士。"},
  {j:"私は台湾人<em>です</em>。",z:"我是台灣人。"}
 ]},
{id:"masu-masen",cat:"基本句型",t:"～ます・～ません",
 p:"動詞ます形 ＋ ます／ません",
 ex:"丁寧體（禮貌體）的現在肯定與否定。對長輩、陌生人使用。普通體為辞書形／ない形。",
 eg:[
  {j:"明日、私は<em>働きます</em>。",z:"明天我會工作。"},
  {j:"高橋部長はタバコを<em>吸いません</em>。",z:"高橋部長不抽菸。"},
  {j:"夜8時から9時まで<em>勉強します</em>。",z:"晚上8點到9點讀書。"}
 ]},
{id:"na-adj-present",cat:"基本句型",t:"～です・～じゃありません（な形容詞）",
 p:"な形容詞語幹 ＋ です／じゃありません",
 ex:"な形容詞的丁寧體現在式。肯定接「です」，否定接「じゃありません」。修飾名詞時加「な」。",
 eg:[
  {j:"この部屋は<em>静かです</em>。",z:"這個房間很安靜。"},
  {j:"あの人は<em>親切じゃありません</em>。",z:"那個人不親切。"},
  {j:"日本語の勉強は<em>好きです</em>。",z:"喜歡學日文。"}
 ]},
{id:"i-adj-present",cat:"基本句型",t:"～いです・～くないです",
 p:"い形容詞 ＋ です／い→くないです",
 ex:"い形容詞現在式。否定時去掉「い」加「くないです」（或「くありません」）。「いい」的否定是「よくないです」。",
 eg:[
  {j:"今日は<em>暑いです</em>。",z:"今天很熱。"},
  {j:"この映画は<em>面白くないです</em>。",z:"這部電影不有趣。"},
  {j:"日本語は<em>難しいです</em>。",z:"日文很難。"}
 ]},
{id:"deshita-noun",cat:"基本句型",t:"～でした・～じゃありませんでした（名詞）",
 p:"名詞 ＋ でした／じゃありませんでした",
 ex:"名詞過去式。「でした」是過去肯定，「じゃありませんでした」是過去否定。",
 eg:[
  {j:"昨日は<em>休みでした</em>。",z:"昨天是休息日。"},
  {j:"あの店は寿司屋<em>じゃありませんでした</em>。",z:"那家店以前不是壽司店。"},
  {j:"先週の日曜日は<em>いい天気でした</em>。",z:"上週日是好天氣。"}
 ]},
{id:"mashita",cat:"基本句型",t:"～ました・～ませんでした",
 p:"動詞ます形 ＋ ました／ませんでした",
 ex:"動詞的丁寧體過去式。「ました」是過去肯定，「ませんでした」是過去否定。",
 eg:[
  {j:"昨日、映画を<em>見ました</em>。",z:"昨天看了電影。"},
  {j:"朝ごはんを<em>食べませんでした</em>。",z:"沒吃早餐。"},
  {j:"去年、日本へ<em>行きました</em>。",z:"去年去了日本。"}
 ]},
{id:"na-adj-past",cat:"基本句型",t:"～でした・～じゃありませんでした（な形容詞）",
 p:"な形容詞語幹 ＋ でした／じゃありませんでした",
 ex:"な形容詞的過去式，用法與名詞過去式相同。",
 eg:[
  {j:"昨日の試験は<em>簡単でした</em>。",z:"昨天的考試很簡單。"},
  {j:"あの町は<em>にぎやかじゃありませんでした</em>。",z:"那個城鎮以前不熱鬧。"},
  {j:"子供のとき、野菜が<em>嫌いでした</em>。",z:"小時候討厭蔬菜。"}
 ]},
{id:"i-adj-past",cat:"基本句型",t:"～かったです・～くなかったです",
 p:"い形容詞：い→かったです／い→くなかったです",
 ex:"い形容詞過去式。去「い」加「かったです」（肯定）、「くなかったです」（否定）。「いい」→「よかったです」。",
 eg:[
  {j:"昨日は<em>寒かったです</em>。",z:"昨天很冷。"},
  {j:"テストは<em>難しくなかったです</em>。",z:"考試不難。"},
  {j:"旅行は<em>よかったです</em>。",z:"旅行很好。"}
 ]},
{id:"masenka",cat:"基本句型",t:"～ませんか",
 p:"動詞ます形 ＋ ませんか",
 ex:"委婉的邀請表現。「要不要一起…？」語氣比「ましょう」更禮貌。",
 eg:[
  {j:"一緒に昼ごはんを<em>食べませんか</em>。",z:"要不要一起吃午餐？"},
  {j:"週末、映画を<em>見ませんか</em>。",z:"週末要不要看電影？"},
  {j:"ちょっと休み<em>ませんか</em>。",z:"要不要休息一下？"}
 ]},
{id:"narimasu",cat:"基本句型",t:"～くなります・～になります",
 p:"い形→くなります／な形・名詞→になります",
 ex:"表示自然變化的結果。い形容詞去「い」加「くなります」，な形容詞／名詞加「になります」。",
 eg:[
  {j:"春になると、<em>暖かくなります</em>。",z:"到了春天就會變暖。"},
  {j:"日本語が<em>上手になりました</em>。",z:"日文變好了。"},
  {j:"来年、大学生<em>になります</em>。",z:"明年要變成大學生了。"}
 ]},
{id:"shimasu-change",cat:"基本句型",t:"～くします・～にします",
 p:"い形→くします／な形・名詞→にします",
 ex:"表示人為改變。い形容詞去「い」加「くします」，な形容詞／名詞加「にします」。",
 eg:[
  {j:"音を<em>小さくします</em>。",z:"把聲音調小。"},
  {j:"部屋を<em>きれいにします</em>。",z:"把房間弄乾淨。"},
  {j:"コーヒーを<em>ホットにします</em>。",z:"咖啡要熱的。"}
 ]},
{id:"mashou",cat:"基本句型",t:"～ましょう",
 p:"動詞ます形 ＋ ましょう",
 ex:"表示提議或邀約「一起做吧」。也可用於自言自語「我來做吧」。",
 eg:[
  {j:"一緒に<em>行きましょう</em>。",z:"一起去吧。"},
  {j:"タクシーで<em>行きましょう</em>。",z:"搭計程車去吧。"},
  {j:"ちょっと<em>休みましょう</em>。",z:"休息一下吧。"}
 ]},
{id:"teinei-futsuu",cat:"基本句型",t:"丁寧体與普通体",
 p:"丁寧体（です・ます）／普通体（だ・辞書形・ない形等）",
 ex:"丁寧體用於正式場合、對長輩陌生人。普通體用於朋友、家人。根據場合切換是日語的重要概念。",
 eg:[
  {j:"（丁寧）明日は雨<em>です</em>。",z:"明天會下雨。"},
  {j:"（普通）明日は雨<em>だ</em>。",z:"明天會下雨。"},
  {j:"（丁寧）日本語を勉強してい<em>ます</em>。→（普通）勉強してい<em>る</em>。",z:"正在學日文。"}
 ]},
{id:"teinei-hitei",cat:"基本句型",t:"丁寧体否定表現",
 p:"～ません ＝ ～ないです",
 ex:"丁寧體否定有兩種說法：「ません」較正式，「ないです」較口語。意思相同，可互換。",
 eg:[
  {j:"行き<em>ません</em>。＝ 行か<em>ないです</em>。",z:"不去。"},
  {j:"食べ<em>ません</em>。＝ 食べ<em>ないです</em>。",z:"不吃。"},
  {j:"高く<em>ありません</em>。＝ 高く<em>ないです</em>。",z:"不貴。"}
 ]},

// ── 助詞 ──
{id:"wa-topic",cat:"助詞",t:"助詞「は」（主題）",
 p:"名詞 ＋ は",
 ex:"標示句子的主題，讀作「wa」。「は」標示的是「談論的對象」，不一定等於主語。",
 eg:[
  {j:"<em>私は</em>大学生です。",z:"我是大學生。"},
  {j:"<em>富士山は</em>日本でいちばん高い山です。",z:"富士山是日本最高的山。"},
  {j:"<em>このお弁当は</em>妻が作りました。",z:"這個便當是妻子做的。"}
 ],n:"「は」和「が」的區別：「は」＝舊資訊（主題），「が」＝新資訊（焦點）。"},
{id:"mo-particle",cat:"助詞",t:"助詞「も」",
 p:"名詞 ＋ も",
 ex:"表示「也」。取代「は」「が」「を」使用，表示與前述同類。",
 eg:[
  {j:"私は学生です。田中さん<em>も</em>学生です。",z:"我是學生。田中也是學生。"},
  {j:"コーヒー<em>も</em>紅茶<em>も</em>好きです。",z:"咖啡和紅茶都喜歡。"},
  {j:"何<em>も</em>食べませんでした。",z:"什麼都沒吃。（疑問詞＋も＋否定）"}
 ]},
{id:"no-possess",cat:"助詞",t:"助詞「の」（所有格）",
 p:"名詞A ＋ の ＋ 名詞B",
 ex:"表示所有、所屬、同位等關係。A 修飾 B，類似中文的「的」。",
 eg:[
  {j:"<em>私の</em>本。",z:"我的書。"},
  {j:"<em>日本語の</em>先生。",z:"日文老師。"},
  {j:"<em>東京大学の</em>学生。",z:"東京大學的學生。"}
 ]},
{id:"ka-question",cat:"助詞",t:"助詞「か」（疑問）",
 p:"文末 ＋ か",
 ex:"放在句尾表示疑問。丁寧體用「～ますか」「～ですか」。",
 eg:[
  {j:"これは何です<em>か</em>。",z:"這是什麼？"},
  {j:"田中さんは学生です<em>か</em>。",z:"田中是學生嗎？"},
  {j:"明日、学校に行きます<em>か</em>。",z:"明天去學校嗎？"}
 ]},
{id:"ni-time",cat:"助詞",t:"助詞「に」（時間點）",
 p:"時間名詞 ＋ に",
 ex:"標示動作發生的具體時間點。星期、日期、幾點需要加「に」，但「今日、昨日、毎日」等不加。",
 eg:[
  {j:"<em>7時に</em>起きます。",z:"7點起床。"},
  {j:"<em>月曜日に</em>会議があります。",z:"星期一有會議。"},
  {j:"<em>3月25日に</em>日本へ行きます。",z:"3月25日去日本。"}
 ],n:"「今日、昨日、明日、毎日、毎週、先週、来月」等相對時間不加「に」。"},
{id:"e-direction",cat:"助詞",t:"助詞「へ」（移動方向）",
 p:"場所 ＋ へ",
 ex:"表示移動的方向，讀作「e」。常與「行きます・来ます・帰ります」等移動動詞搭配。可與「に」互換。",
 eg:[
  {j:"日本<em>へ</em>行きます。",z:"去日本。"},
  {j:"家<em>へ</em>帰ります。",z:"回家。"},
  {j:"どこ<em>へ</em>行きますか。",z:"要去哪裡？"}
 ]},
{id:"de-transport",cat:"助詞",t:"助詞「で」（交通工具）",
 p:"交通工具 ＋ で",
 ex:"表示使用的交通手段。步行用「歩いて」不用「で」。",
 eg:[
  {j:"バス<em>で</em>学校に行きます。",z:"搭公車去學校。"},
  {j:"飛行機<em>で</em>東京へ行きます。",z:"搭飛機去東京。"},
  {j:"自転車<em>で</em>来ました。",z:"騎腳踏車來的。"}
 ]},
{id:"to-companion",cat:"助詞",t:"助詞「と」（動作夥伴）",
 p:"人 ＋ と（一緒に）",
 ex:"表示一起做某動作的對象。「と一緒に」更強調一起的感覺。",
 eg:[
  {j:"友達<em>と</em>映画を見ます。",z:"和朋友看電影。"},
  {j:"家族<em>と</em>旅行に行きました。",z:"和家人去旅行了。"},
  {j:"誰<em>と</em>行きますか。",z:"和誰去？"}
 ]},
{id:"o-object",cat:"助詞",t:"助詞「を」（受詞）",
 p:"名詞 ＋ を ＋ 他動詞",
 ex:"標示動作的對象（受詞），讀作「o」。接在他動詞前面。",
 eg:[
  {j:"朝ごはん<em>を</em>食べます。",z:"吃早餐。"},
  {j:"新聞<em>を</em>読みます。",z:"看報紙。"},
  {j:"日本語<em>を</em>勉強しています。",z:"正在學日文。"}
 ]},
{id:"de-place",cat:"助詞",t:"助詞「で」（動作地點）",
 p:"場所 ＋ で ＋ 動詞",
 ex:"表示動作進行的場所。注意：存在用「に」，動作用「で」。",
 eg:[
  {j:"図書館<em>で</em>勉強します。",z:"在圖書館讀書。"},
  {j:"レストラン<em>で</em>ご飯を食べます。",z:"在餐廳吃飯。"},
  {j:"公園<em>で</em>遊びました。",z:"在公園玩了。"}
 ],n:"比較：「公園<b>に</b>います」（在公園＝存在）vs「公園<b>で</b>遊びます」（在公園玩＝動作）。"},
{id:"kara-origin",cat:"助詞",t:"助詞「から」（起點）",
 p:"名詞 ＋ から",
 ex:"表示時間或空間的起點。常與「まで」搭配使用。",
 eg:[
  {j:"9時<em>から</em>5時まで働きます。",z:"從9點工作到5點。"},
  {j:"東京<em>から</em>大阪まで新幹線で3時間かかります。",z:"從東京到大阪搭新幹線要3小時。"},
  {j:"来月<em>から</em>日本語を勉強します。",z:"從下個月開始學日文。"}
 ]},
{id:"made-endpoint",cat:"助詞",t:"助詞「まで」（終點・限界）",
 p:"名詞 ＋ まで",
 ex:"表示時間或空間的終點、限界。「到～為止」。",
 eg:[
  {j:"12時<em>まで</em>勉強します。",z:"讀書到12點。"},
  {j:"駅<em>まで</em>歩きます。",z:"走路到車站。"},
  {j:"明日<em>まで</em>に出してください。",z:"請在明天之前交出來。"}
 ]},
{id:"to-listing",cat:"助詞",t:"助詞「と」（並列）",
 p:"名詞A ＋ と ＋ 名詞B",
 ex:"全部列舉。把所有項目用「と」連接，表示「A和B」。列舉的是全部，不是部分。",
 eg:[
  {j:"机の上にペン<em>と</em>ノートがあります。",z:"桌上有筆和筆記本。"},
  {j:"りんご<em>と</em>みかんを買いました。",z:"買了蘋果和橘子。"},
  {j:"日本語<em>と</em>英語を勉強しています。",z:"正在學日文和英文。"}
 ]},
{id:"ya-listing",cat:"助詞",t:"助詞「や」（部分列舉）",
 p:"名詞A ＋ や ＋ 名詞B（＋ など）",
 ex:"部分列舉。表示「A啊B啊（之類的）」，暗示還有其他未提到的東西。常搭配「など」。",
 eg:[
  {j:"机の上にペン<em>や</em>ノート<em>など</em>があります。",z:"桌上有筆啊筆記本之類的。"},
  {j:"休みの日は映画<em>や</em>買い物をします。",z:"休假日看電影啊購物之類的。"},
  {j:"日本<em>や</em>韓国に行きたいです。",z:"想去日本啊韓國之類的。"}
 ]},
{id:"de-means",cat:"助詞",t:"助詞「で」（手段・工具）",
 p:"工具／手段 ＋ で",
 ex:"表示使用的工具或手段。「用～」。",
 eg:[
  {j:"はし<em>で</em>ご飯を食べます。",z:"用筷子吃飯。"},
  {j:"日本語<em>で</em>手紙を書きます。",z:"用日文寫信。"},
  {j:"スマホ<em>で</em>写真を撮りました。",z:"用手機拍了照片。"}
 ]},
{id:"ni-recipient",cat:"助詞",t:"助詞「に」（動作對象）",
 p:"人 ＋ に ＋ 動詞",
 ex:"表示動作的對象（接受者）。常搭配「あげます、もらいます、教えます、会います」等。",
 eg:[
  {j:"友達<em>に</em>プレゼントをあげます。",z:"送禮物給朋友。"},
  {j:"先生<em>に</em>質問します。",z:"向老師提問。"},
  {j:"駅で友達<em>に</em>会いました。",z:"在車站遇到了朋友。"}
 ]},
{id:"kara-giver",cat:"助詞",t:"助詞「から」（授予方）",
 p:"人 ＋ から ＋ もらいます等",
 ex:"表示授予的來源。「從某人那裡得到」。",
 eg:[
  {j:"母<em>から</em>手紙をもらいました。",z:"從媽媽那裡收到了信。"},
  {j:"先生<em>から</em>日本語を習いました。",z:"跟老師學了日文。"},
  {j:"友達<em>から</em>プレゼントをもらいました。",z:"從朋友那裡收到了禮物。"}
 ]},
{id:"ni-contact",cat:"助詞",t:"助詞「に」（接觸點）",
 p:"名詞 ＋ に ＋ 動詞",
 ex:"表示接觸、附著的對象。搭配「乗ります、座ります、触ります」等。",
 eg:[
  {j:"バス<em>に</em>乗ります。",z:"搭公車。"},
  {j:"椅子<em>に</em>座ります。",z:"坐在椅子上。"},
  {j:"壁<em>に</em>絵をかけます。",z:"在牆上掛畫。"}
 ]},
{id:"de-unit",cat:"助詞",t:"助詞「で」（動作單位）",
 p:"數量／人數 ＋ で",
 ex:"表示進行動作的單位或範圍。「以～」。",
 eg:[
  {j:"3人<em>で</em>行きます。",z:"3個人去。"},
  {j:"全部<em>で</em>いくらですか。",z:"全部多少錢？"},
  {j:"1000円<em>で</em>おつりをください。",z:"用1000日圓，請找零。"}
 ]},
{id:"ga-ability",cat:"助詞",t:"助詞「が」（能力・好惡）",
 p:"名詞 ＋ が ＋ わかります／できます／好きです等",
 ex:"搭配能力、好惡、感情等表現時，對象用「が」標示。",
 eg:[
  {j:"日本語<em>が</em>わかります。",z:"懂日文。"},
  {j:"料理<em>が</em>できます。",z:"會做菜。"},
  {j:"猫<em>が</em>好きです。",z:"喜歡貓。"}
 ]},
{id:"ni-exist",cat:"助詞",t:"助詞「に」（存在位置）",
 p:"場所 ＋ に ＋ あります／います",
 ex:"表示人或物存在的位置。搭配「あります」（物）或「います」（有生命的）。",
 eg:[
  {j:"机の上<em>に</em>本があります。",z:"桌上有書。"},
  {j:"庭<em>に</em>猫がいます。",z:"庭院裡有貓。"},
  {j:"東京<em>に</em>住んでいます。",z:"住在東京。"}
 ]},
{id:"kara-reason",cat:"助詞",t:"助詞「から」（原因・理由）",
 p:"普通形／丁寧形 ＋ から",
 ex:"表示原因理由。「因為A，所以B」。口語中常放在句尾「～んですから」。",
 eg:[
  {j:"仕事で使います<em>から</em>、日本語を勉強しています。",z:"因為工作上會用到，所以在學日文。"},
  {j:"お金がありません<em>から</em>、何も買いません。",z:"因為沒有錢，什麼都不買。"},
  {j:"寒いです<em>から</em>、窓を閉めてください。",z:"因為很冷，請關窗。"},
  {j:"危ないです<em>から</em>、触らないでください。",z:"因為危險，請不要碰。"}
 ]},
{id:"ni-entry",cat:"助詞",t:"助詞「に」（進入點・到達點）",
 p:"場所 ＋ に ＋ 入ります・着きます等",
 ex:"表示進入或到達的目的地。搭配「入ります、着きます、届きます」等動詞。",
 eg:[
  {j:"部屋<em>に</em>入ります。",z:"進入房間。"},
  {j:"駅<em>に</em>着きました。",z:"到車站了。"},
  {j:"荷物が家<em>に</em>届きました。",z:"行李送到家了。"}
 ]},
{id:"o-depart",cat:"助詞",t:"助詞「を」（離開點）",
 p:"場所 ＋ を ＋ 出ます・降ります等",
 ex:"表示離開某場所。搭配「出ます、降ります、卒業します」等動詞。",
 eg:[
  {j:"朝7時に家<em>を</em>出ます。",z:"早上7點離開家。"},
  {j:"東京駅<em>を</em>降ります。",z:"在東京站下車。"},
  {j:"来年、大学<em>を</em>卒業します。",z:"明年大學畢業。"}
 ]},
{id:"o-passage",cat:"助詞",t:"助詞「を」（經過點）",
 p:"場所 ＋ を ＋ 歩きます・渡ります等",
 ex:"表示經過、通過的場所。搭配「歩きます、走ります、渡ります、曲がります」等。",
 eg:[
  {j:"公園<em>を</em>歩きます。",z:"走過公園。"},
  {j:"橋<em>を</em>渡ります。",z:"過橋。"},
  {j:"角<em>を</em>右に曲がります。",z:"在路口右轉。"}
 ]},
{id:"dake",cat:"助詞",t:"限定助詞「だけ」",
 p:"名詞 ＋ だけ",
 ex:"表示「只有～」。限定範圍，語氣中性或滿足。",
 eg:[
  {j:"コーヒー<em>だけ</em>飲みます。",z:"只喝咖啡。"},
  {j:"日曜日<em>だけ</em>休みです。",z:"只有星期日休息。"},
  {j:"少し<em>だけ</em>食べました。",z:"只吃了一點。"}
 ]},
{id:"shika",cat:"助詞",t:"限定助詞「しか」",
 p:"名詞 ＋ しか ＋ 否定",
 ex:"表示「只有～」但帶有「不夠、遺憾」的語氣。後面必須接否定形。",
 eg:[
  {j:"1000円<em>しか</em>ありません。",z:"只有1000日圓（不夠的感覺）。"},
  {j:"日本語<em>しか</em>話せません。",z:"只會說日文。"},
  {j:"水<em>しか</em>飲みません。",z:"只喝水。"}
 ],n:"「だけ」與「しか」的區別：「だけ」中性，「しか＋否定」帶有不滿足的語氣。"},
{id:"ne-particle",cat:"助詞",t:"終助詞「ね」",
 p:"文末 ＋ ね",
 ex:"表示確認、同意或共感。「是吧、對吧」。",
 eg:[
  {j:"いい天気です<em>ね</em>。",z:"天氣真好呢。"},
  {j:"この料理はおいしいです<em>ね</em>。",z:"這道菜好吃呢。"},
  {j:"明日は日曜日です<em>ね</em>。",z:"明天是星期日對吧。"}
 ]},
{id:"yo-particle",cat:"助詞",t:"終助詞「よ」",
 p:"文末 ＋ よ",
 ex:"表示告知對方不知道的資訊或強調。「喔、呢」。",
 eg:[
  {j:"このケーキ、おいしいです<em>よ</em>。",z:"這個蛋糕很好吃喔。"},
  {j:"明日は休みです<em>よ</em>。",z:"明天放假喔。"},
  {j:"もう遅いです<em>よ</em>。",z:"已經很晚了喔。"}
 ]},
{id:"wa-emotion",cat:"助詞",t:"終助詞「わ」",
 p:"文末 ＋ わ",
 ex:"表示感嘆或柔和的斷定。傳統上女性用語，現代男女皆可使用（尤其關西方言）。",
 eg:[
  {j:"すごい<em>わ</em>。",z:"好厲害啊。"},
  {j:"もう帰る<em>わ</em>。",z:"我要回去了。"},
  {j:"これ、高い<em>わ</em>。",z:"這個好貴啊。"}
 ]},
{id:"ga-subject",cat:"助詞",t:"助詞「が」（主語）",
 p:"名詞 ＋ が",
 ex:"標示主語（動作的執行者）。用在新資訊、疑問詞的回答、從屬子句等場合。",
 eg:[
  {j:"誰<em>が</em>来ましたか。",z:"誰來了？"},
  {j:"田中さん<em>が</em>来ました。",z:"田中來了。"},
  {j:"雨<em>が</em>降っています。",z:"正在下雨。"}
 ]},
{id:"ga-adversative",cat:"助詞",t:"助詞「が」（逆接）",
 p:"文A ＋ が ＋ 文B",
 ex:"連接兩個句子，表示轉折。「雖然A，但是B」。",
 eg:[
  {j:"日本語は難しい<em>です</em><em>が</em>、面白いです。",z:"日文雖然難，但是有趣。"},
  {j:"この服は安い<em>です</em><em>が</em>、品質がいいです。",z:"這件衣服雖然便宜，但品質好。"},
  {j:"行きたい<em>です</em><em>が</em>、時間がありません。",z:"雖然想去，但是沒有時間。"}
 ]},
{id:"ga-preface",cat:"助詞",t:"助詞「が」（前言）",
 p:"文A ＋ が ＋ 文B",
 ex:"用於開場白，引出正題。不一定是轉折，只是鋪陳。「那個…」。",
 eg:[
  {j:"すみません<em>が</em>、ちょっと教えてください。",z:"不好意思，可以教我一下嗎？"},
  {j:"あのう、ちょっとお聞きしたいんです<em>が</em>…",z:"那個，我想請問一下…"},
  {j:"実は来月から転勤になったんです<em>が</em>…",z:"其實下個月要調職…"}
 ]},
{id:"kedo-particle",cat:"助詞",t:"助詞「けど」",
 p:"文A ＋ けど ＋ 文B",
 ex:"口語的逆接或前言助詞。比「が」更隨意。正式形為「けれども」。",
 eg:[
  {j:"安い<em>けど</em>、おいしいです。",z:"雖然便宜，但很好吃。"},
  {j:"明日は暇です<em>けど</em>、何かありますか。",z:"明天有空，有什麼事嗎？"},
  {j:"ちょっと聞きたいんです<em>けど</em>…",z:"想問一下…"}
 ]},
{id:"ni-purpose",cat:"助詞",t:"助詞「に」（目的）",
 p:"動詞ます形（去ます） ＋ に ＋ 行きます／来ます等",
 ex:"表示移動的目的。「去做某事」。ます形去掉「ます」後接「に」。",
 eg:[
  {j:"映画を見<em>に</em>行きます。",z:"去看電影。"},
  {j:"ご飯を食べ<em>に</em>来ました。",z:"來吃飯的。"},
  {j:"日本へ勉強し<em>に</em>行きます。",z:"去日本唸書。"}
 ]},
{id:"ni-frequency",cat:"助詞",t:"助詞「に」（頻率・比例）",
 p:"期間 ＋ に ＋ 回數",
 ex:"表示在某段時間內的頻率。「每～做幾次」。",
 eg:[
  {j:"1週間<em>に</em>3回運動します。",z:"一週運動3次。"},
  {j:"1か月<em>に</em>2回映画を見ます。",z:"一個月看2次電影。"},
  {j:"1日<em>に</em>3回薬を飲みます。",z:"一天吃3次藥。"}
 ]},
{id:"de-scope",cat:"助詞",t:"助詞「で」（範圍）",
 p:"範圍 ＋ で",
 ex:"表示限定的範圍中進行比較或判斷。",
 eg:[
  {j:"クラス<em>で</em>いちばん背が高いです。",z:"在班上最高。"},
  {j:"世界<em>で</em>いちばん有名な山は何ですか。",z:"世界上最有名的山是什麼？"},
  {j:"日本<em>で</em>何がいちばん好きですか。",z:"在日本最喜歡什麼？"}
 ]},
{id:"ga-no-interchange",cat:"助詞",t:"連体修飾節「が」與「の」的互換",
 p:"連体修飾節中：が ↔ の",
 ex:"在修飾名詞的子句中，「が」可以用「の」替換，語感更自然。",
 eg:[
  {j:"私<em>が</em>作ったケーキ ＝ 私<em>の</em>作ったケーキ",z:"我做的蛋糕"},
  {j:"花<em>が</em>きれいな公園 ＝ 花<em>の</em>きれいな公園",z:"花很漂亮的公園"},
  {j:"音<em>が</em>大きい部屋 ＝ 音<em>の</em>大きい部屋",z:"聲音很大的房間"}
 ]},
{id:"wa-contrast",cat:"助詞",t:"助詞「は」（區別・對比）",
 p:"名詞A ＋ は ～。名詞B ＋ は ～。",
 ex:"用「は」對比兩個事物。強調差異。",
 eg:[
  {j:"肉<em>は</em>好きですが、魚<em>は</em>好きじゃありません。",z:"喜歡肉，但不喜歡魚。"},
  {j:"漢字<em>は</em>読めますが、書くこと<em>は</em>できません。",z:"漢字看得懂，但不會寫。"},
  {j:"ビール<em>は</em>飲みますが、ワイン<em>は</em>飲みません。",z:"啤酒會喝，但葡萄酒不喝。"}
 ]},
{id:"ka-selection",cat:"助詞",t:"助詞「か」（選擇）",
 p:"名詞A ＋ か ＋ 名詞B",
 ex:"表示選擇「A或B」。",
 eg:[
  {j:"コーヒー<em>か</em>紅茶、どちらがいいですか。",z:"咖啡或紅茶，哪個好？"},

 ]},

// ── 動詞活用 ──
{id:"masu-form",cat:"動詞活用",t:"動詞ます形",

 eg:[
  {j:"書く → 書き<em>ます</em>",z:"寫（五段）"},
  {j:"食べる → 食べ<em>ます</em>",z:"吃（一段）"},

 ]},

 p:"五段動詞音便變化＋て／一段動詞：去る＋て",
 ex:"最重要的活用形之一，用於連接、請求、進行等。五段動詞有音便變化：く→いて、ぐ→いで、す→して、む・ぶ・ぬ→んで、う・つ・る→って。",
 eg:[
  {j:"書く→書い<em>て</em>、泳ぐ→泳い<em>で</em>",z:"寫、游泳"},

  {j:"食べる→食べ<em>て</em>、する→し<em>て</em>、来る→来（き）<em>て</em>",z:"吃、做、來"}
 ],n:"例外：行く→行って（不是行いて）。"},
{id:"dict-form",cat:"動詞活用",t:"辞書形",
 p:"動詞的原形（字典形）",

 eg:[
  {j:"書きます → <em>書く</em>",z:"寫"},
  {j:"食べます → <em>食べる</em>",z:"吃"},
  {j:"します → <em>する</em>、来ます → <em>来る</em>",z:"做、來"}
 ]},
{id:"nai-form",cat:"動詞活用",t:"ない形",
 p:"五段動詞：う段→あ段＋ない／一段動詞：去る＋ない",

  {j:"食べる → 食べ<em>ない</em>",z:"不吃"},
  {j:"する → し<em>ない</em>、来る → 来（こ）<em>ない</em>",z:"不做、不來"},
  {j:"買う → 買<em>わない</em>（不是買あない）",z:"不買"}
 ]},
{id:"ta-form",cat:"動詞活用",t:"た形",

  {j:"食べる→食べ<em>た</em>",z:"吃了"},
  {j:"する→し<em>た</em>、来る→来（き）<em>た</em>",z:"做了、來了"}
 ]},
{id:"nakatta-form",cat:"動詞活用",t:"なかった形",

  {j:"食べない→食べ<em>なかった</em>",z:"沒吃"},
  {j:"しない→し<em>なかった</em>、来ない→来（こ）<em>なかった</em>",z:"沒做、沒來"}
 ]},
{id:"verb-plain",cat:"動詞活用",t:"動詞的普通形",
 p:"肯定：辞書形 → 否定：ない形 → 過去肯定：た形 → 過去否定：なかった形",
 ex:"普通形四種變化的總整理。普通形用在朋友間的會話以及各種文法接續。",

  {j:"見る / 見ない / 見た / 見<em>なかった</em>",z:"看／不看／看了／沒看"},
  {j:"する / しない / した / し<em>なかった</em>",z:"做／不做／做了／沒做"}
 ]},

 ]},

 ]},

  {j:"先生が日本語を教えて<em>くれました</em>。",z:"老師教了我日文。"}
 ]},

 eg:[
  {j:"窓が開い<em>ています</em>。（自然）",z:"窗戶開著。"},
  {j:"窓が開け<em>てあります</em>。（有人開的）",z:"窗戶被（刻意）打開著。"},
  {j:"壁に絵がかけ<em>てあります</em>。",z:"牆上掛著畫（有人掛的）。"}
 ]},
{id:"plain-noun-mod",cat:"修飾・接續",t:"連体修飾",
 p:"普通形 ＋ 名詞",
 ex:"用普通形修飾後面的名詞，形成「做了～的○○」等表達。",
 eg:[
  {j:"昨日<em>買った</em>本。",z:"昨天買的書。"},
  {j:"日本語を<em>勉強している</em>学生。",z:"正在學日文的學生。"},
  {j:"あそこに<em>いる</em>人。",z:"在那裡的人。"}
 ]},
{id:"adnominal",cat:"修飾・接續",t:"連体詞",
 p:"この・その・あの・どの・大きな・小さな・いろんな 等",
 ex:"直接放在名詞前面修飾的特殊詞類，沒有活用變化。",
 eg:[
  {j:"<em>この</em>映画は面白いです。",z:"這部電影很有趣。"},
  {j:"<em>大きな</em>家に住みたいです。",z:"想住大房子。"},
  {j:"<em>いろんな</em>国に行きました。",z:"去了各種國家。"}
 ]}
];

// ===== CATEGORIES =====
const CATEGORIES = [
  {name:"基本句型", icon:"文"},
  {name:"助詞", icon:"助"},
  {name:"動詞活用", icon:"動"},
  {name:"形容詞・名詞", icon:"形"},
  {name:"存在表現", icon:"在"},
  {name:"授受動詞", icon:"授"},
  {name:"て形的用法", icon:"て"},
  {name:"時間・順序", icon:"時"},
  {name:"希望・請求", icon:"望"},
  {name:"數量・指示", icon:"數"},
  {name:"修飾・接續", icon:"接"},
  {name:"副詞", icon:"副"},
  {name:"其他表現", icon:"他"}
];

// ===== RENDER =====
function render(filter = '') {
  const main = document.getElementById('main');
  const sidebar = document.getElementById('sidebar');
  const lf = filter.toLowerCase();

  // Filter data
  const filtered = filter
    ? DATA.filter(d => d.t.toLowerCase().includes(lf) || d.ex.toLowerCase().includes(lf) ||
        (d.p && d.p.toLowerCase().includes(lf)) ||
        d.eg.some(e => e.j.toLowerCase().includes(lf) || e.z.toLowerCase().includes(lf)))
    : DATA;

  // Group by category
  const groups = {};
  CATEGORIES.forEach(c => groups[c.name] = []);
  filtered.forEach((d,i) => {
    if (groups[d.cat]) groups[d.cat].push({...d, idx: DATA.indexOf(d)+1});
  });

  // Render main
  let html = '';
  if (!filter) {
    html += `<div class="intro">
      <h2>出口日語 N5 文法完整筆記</h2>
      <p>根據出口仁老師的 YouTube N5 文法教學系列整理。涵蓋基本句型、助詞、動詞活用、形容詞、
      存在表現、授受動詞、て形用法、時間順序、希望請求、數量指示、修飾接續、副詞等 13 大分類，
      共 119 個文法點。</p>
      <div class="tag-row">
        <span class="tag">JLPT N5</span>
        <span class="tag">119 文法點</span>
        <span class="tag">出口日語</span>
        <span class="tag">初級日文</span>
      </div>
    </div>`;
  }

  let visibleCount = 0;
  CATEGORIES.forEach(cat => {
    const items = groups[cat.name];
    if (!items || items.length === 0) return;
    visibleCount += items.length;

    html += `<section class="cat-section" id="cat-${cat.name}">
      <h2><span class="cat-icon">${cat.icon}</span>${cat.name}
        <span style="font-size:13px;color:#999;font-weight:400;margin-left:auto">${items.length} 項</span>
      </h2>`;

    items.forEach(d => {
      html += `<div class="grammar-card" id="${d.id}">
        <div class="card-header" onclick="toggleCard(this)">
          <span class="card-num">${d.idx}</span>
          <span class="card-title">${d.t}</span>
          <svg class="card-toggle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
        <div class="card-body">
          <div class="card-content">
            <div class="pattern-box">${d.p}</div>
            <div class="explain">${d.ex}</div>
            <div class="examples">
              ${d.eg.map(e => `<div class="example">
                <div class="jp">${e.j}</div>
                <div class="zh">${e.z}</div>
              </div>`).join('')}
            </div>
            ${d.n ? `<div class="note">${d.n}</div>` : ''}
          </div>
        </div>
      </div>`;
    });

    html += '</section>';
  });

  if (visibleCount === 0) {
    html += `<div class="no-results">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <p>找不到符合「${filter}」的文法項目</p>
    </div>`;
  }

  main.innerHTML = html;
  document.getElementById('stats').textContent = `${visibleCount} / 119 個文法點`;

  // Render sidebar
  let sideHtml = '';
  CATEGORIES.forEach(cat => {
    const items = groups[cat.name];
    if (!items || items.length === 0) return;
    sideHtml += `<div class="cat-title" onclick="toggleCat(this)">${cat.name}</div>`;
    sideHtml += `<div class="cat-items" style="max-height:${items.length * 32}px">`;
    items.forEach(d => {
      sideHtml += `<a href="#${d.id}" onclick="closeSidebarMobile()">${d.t}</a>`;
    });
    sideHtml += '</div>';
  });
  sidebar.innerHTML = sideHtml;
}

// ===== INTERACTIONS =====
function toggleCard(header) {
  header.parentElement.classList.toggle('open');
}

function toggleCat(title) {
  title.classList.toggle('collapsed');
  const items = title.nextElementSibling;
  items.classList.toggle('collapsed');
}

let searchTimer;
function onSearch(val) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => render(val.trim()), 200);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function closeSidebarMobile() {
  if (window.innerWidth <= 860) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  }
}

// Back to top
window.addEventListener('scroll', () => {
  document.getElementById('backTop').classList.toggle('show', window.scrollY > 400);

  // Active sidebar link
  const cards = document.querySelectorAll('.grammar-card');
  let current = '';
  cards.forEach(card => {
    if (card.getBoundingClientRect().top < 120) current = card.id;
  });
  document.querySelectorAll('.sidebar a').forEach(a => {
    a.classList.toggle('active', a.getAttribute('href') === '#' + current);
  });
});

// Init
render();

// Expand card if URL has hash
if (location.hash) {
  const el = document.querySelector(location.hash);
  if (el && el.classList.contains('grammar-card')) {
    el.classList.add('open');
    setTimeout(() => el.scrollIntoView({behavior:'smooth'}), 100);
  }
}
</script>
</body>
</html>
