name: Verify subscription decouple (Gate 1)

# 自動把關訂閱獨立改動:build + 遷移邏輯單測 + emulator 端對端 + 規則測試。
# 全程用 demo-jpnote 假 project,只跑在 Firestore/Auth emulator,絕不接觸正式資料。
# 不部署任何東西;綠勾代表 Gate 1 通過,可人工決定是否 firebase deploy。

on:
  push:
    branches: ['feat/**', main]
    paths:
      - 'functions/**'
      - 'firestore.rules'
      - 'scripts/**'
      - '.github/workflows/verify-subscription-decouple.yml'
  pull_request:
    paths:
      - 'functions/**'
      - 'firestore.rules'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  gate1:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 21 (Firestore emulator 需求)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install firebase-tools
        run: npm install -g firebase-tools@15

      - name: Build functions (tsc)
        run: |
          cd functions
          npm ci
          npm run build

      - name: 遷移邏輯單測（無需 emulator）
        run: node scripts/migrate-subscriptions.test.js

      - name: 安裝 emulator 測試相依（不寫入 lockfile）
        run: npm install --no-save firebase-admin @firebase/rules-unit-testing

      - name: Gate 1 — emulator 端對端 + 規則測試
        run: |
          firebase emulators:exec \
            --only firestore,auth \
            --project demo-jpnote \
            "node scripts/ci-gate1.js && node scripts/rules-test-subscriptions.js"
